<!DOCTYPE html>
{% load static %}

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panadería WYK - Login</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="login-wrapper">
        <div class="left-panel">
            <div class="left-content">
                <img src="{% static 'images/logo_wyk.png' %}" alt="Logo WYK" class="logo-big">
                <h1>Panadería & Cafetería</h1>
                <h2>WYK Express</h2>
                <p>Sistema de Gestión Integral</p>
                <div class="features">
                    <div class="feature-item"><i class="fa fa-box"></i><span>Inventario</span></div>
                    <div class="feature-item"><i class="fa fa-chart-line"></i><span>Ventas</span></div>
                    <div class="feature-item"><i class="fa fa-industry"></i><span>Producción</span></div>
                    <div class="feature-item"><i class="fa fa-tasks"></i><span>Tareas</span></div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="login-box">
                <div class="login-header">
                    <img src="{% static 'images/logo_wyk.png' %}" alt="Logo" class="logo-small">
                    <h3>Bienvenido</h3>
                    <p>Inicia sesión para continuar</p>
                </div>

                <form action="{% url 'login' %}" id="login-form" method="post" novalidate>
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="username"><i class="fa fa-envelope"></i> Número de Documento</label>
                        <input type="text" name="username" id="username" placeholder="Tu documento" required>
                    </div>

                    <div class="form-group">
                        <label for="password"><i class="fa fa-lock"></i> Contraseña</label>
                        <div class="pass-wrapper">
                            <input type="password" name="password" id="password" placeholder="••••••••" required>
                            <button type="button" class="toggle-pass" onclick="togglePass()">
                                <i class="fa fa-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login" id="btnLogin">
                        <span id="btnText"><i class="fa fa-sign-in-alt"></i> Ingresar</span>
                    </button>
                </form>

                <p class="footer-text">
                    <i class="fa fa-shield-alt"></i> Acceso restringido al personal autorizado
                </p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var errorMessage = "";

            // 1. Capturar errores de validación del formulario (Capa Django Forms)
            {% if form.errors %}
                errorMessage = "Por favor, verifica los datos ingresados.";
            {% endif %}

            // 2. Capturar mensajes de error de la vista (Capa de Seguridad/Auth)
            {% if messages %}
                {% for message in messages %}
                    {% if message.tags == 'error' %}
                        errorMessage = "{{ message }}";
                    {% endif %}
                {% endfor %}
            {% endif %}

            // Si hay algún error, lanzamos el SweetAlert que ya tienes configurado
            if (errorMessage) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error de acceso',
                    text: errorMessage,
                    confirmButtonColor: '#f5a623'
                });
            }
        });
    </script>
    <script src="{% static 'js/sweetalert2.all.min.js' %}"></script>
    <script src="{% static 'js/toads-sweetalert2.js' %}"></script>
    <script src="{% static 'js/login-visual.js' %}"></script>
</body>
</html>

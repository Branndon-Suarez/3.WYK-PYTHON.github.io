<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - WYK</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<main>
    <div class="container">
        <div class="forms-container">
            <div class="container-login">
                <form action="{% url 'login' %}" id="login-form" class="sign-in-form" method="post" novalidate>
                    {% csrf_token %} <h2 class="title">Iniciar Sesión</h2>

                    <div class="input-field">
                        <lord-icon
                            src="https://cdn.lordicon.com/fmasbomy.json"
                            trigger="hover"
                            stroke="bold"
                            colors="primary:#000000,secondary:#a63754,tertiary:#eeca66"
                            style="width:50px;height:50px">
                        </lord-icon>
                        <input type="number" name="username" placeholder="Número de Documento" required>
                    </div>

                    <div class="input-field">
                        <lord-icon
                            src="https://cdn.lordicon.com/zbbefawl.json"
                            trigger="hover"
                            style="width:50px;height:50px">
                        </lord-icon>
                        <input type="password" name="password" placeholder="Contraseña" required>
                    </div>

                    <button type="submit" class="btn solid">Iniciar Sesión</button>

                </form>
            </div>
        </div>

        <div class="panels-container">
            <div class="panel left-panel">
                <div class="content">
                    <h3>¿No estás registrado?</h3>
                    <p>¡Comunícate con el administrador del sistema!</p>
                </div>
                <img src="{% static 'images/imgLogin/login-1.svg' %}" class="image" alt="Ilustración">
            </div>
        </div>
    </div>
</main>

<script>
    // Pasamos los mensajes de Django a variables de JavaScript
    var successMessage = "{{ success_message|default:'' }}";
    var errorMessage = "";

    {% if form.errors %}
        errorMessage = "Documento o contraseña incorrectos.";
    {% endif %}
</script>

<script src="https://cdn.lordicon.com/lordicon.js"></script>
<script src="{% static 'js/sweetalert2.all.min.js' %}"></script>
<script src="{% static 'js/toads-sweetalert2.js' %}"></script>
</body>
</html>

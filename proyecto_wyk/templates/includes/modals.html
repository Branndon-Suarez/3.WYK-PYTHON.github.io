<div id="addTaskModal" class="modal">
    <div class="modal-content">
        <button class="modal-close" id="closeTaskModal">&times;</button>
        <h2 style="margin-bottom: 20px; color: var(--primary);">📋 Nueva Tarea de Panadería</h2>

        <form id="addTaskForm" class="form">
            <div class="form-group" style="grid-column: 1 / -1;">
                <label class="form-label">Nombre de la Tarea</label>
                <input type="text" id="taskName" class="form-input" placeholder="Ej: Revisar stock de harina" required>
            </div>

            <div class="form-group" style="grid-column: 1 / -1;">
                <label class="form-label">Descripción</label>
                <textarea id="taskDescription" class="form-textarea" rows="3" placeholder="Detalles de la tarea..."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Categoría</label>
                <select id="taskCategory" class="form-select">
                    <option value="desarrollo">Compras/Ventas</option>
                    <option value="diseño">Producción/Horneo</option>
                    <option value="testing">Inventario</option>
                    <option value="reunion">Limpieza/Mantenimiento</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Prioridad</label>
                <select id="taskPriority" class="form-select">
                    <option value="baja">Baja</option>
                    <option value="media" selected>Media</option>
                    <option value="alta">Alta</option>
                    <option value="urgente">Urgente 🔥</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Tiempo Estimado (Horas)</label>
                <input type="number" id="taskHours" class="form-input" value="1" min="0.5" step="0.5">
            </div>

            <div style="grid-column: 1 / -1; display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="form-button">Guardar Tarea</button>
                <button type="button" id="cancelTask" class="form-button secondary">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<div id="changePhotoModal" class="modal">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <button class="modal-close" id="closePhotoModal">&times;</button>
        <h2 style="margin-bottom: 20px; color: var(--primary);">Actualizar Perfil</h2>

        <p style="margin-bottom: 15px; color: var(--muted);">Elige un avatar de panadero:</p>
        <div class="avatar-options" style="display: flex; justify-content: center; gap: 15px; margin-bottom: 25px;">
            <div class="avatar-option" data-avatar="👨‍🍳" style="background: var(--secondary-color);">👨‍🍳</div>
            <div class="avatar-option" data-avatar="🍞" style="background: var(--primary-color);">🍞</div>
            <div class="avatar-option" data-avatar="🥐" style="background: var(--accent-color);">🥐</div>
        </div>

        <div style="border-top: 1px solid var(--ring); padding-top: 20px;">
            <p style="margin-bottom: 10px; color: var(--muted);">O sube tu propia foto:</p>
            <input type="file" id="photoInput" accept="image/*" class="form-input" style="font-size: 12px;">
        </div>

        <div style="display: flex; gap: 10px; margin-top: 25px; justify-content: center;">
            <button id="savePhoto" class="form-button">Actualizar</button>
            <button id="cancelPhoto" class="form-button secondary">Cerrar</button>
        </div>
    </div>
</div>
